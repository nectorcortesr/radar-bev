name: Percepcion Industrial CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      # ??? Instala las librerías necesarias. 
      # IMPORTANTE: Usa la versión headless de opencv para servidores sin monitor.
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy pytest flake8
        
    - name: Lint with flake8
      # ??? Ejecuta el linter sobre la carpeta src/ deteniendo el build si hay errores graves
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Test with pytest
      # ??? Ejecuta pytest para buscar y correr todos los archivos test_*.py en tests/
      run: |
        pytest tests/